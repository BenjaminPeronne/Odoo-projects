name: Build desktop applications

on:
  workflow_dispatch:
  push:
    tags:
      - "app-v*"

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.artifact }}
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-15
            artifact: odoo-manager-macos
            bundles: app,dmg
          - platform: ubuntu-22.04
            artifact: odoo-manager-linux-x64
            bundles: deb,appimage
          - platform: windows-latest
            artifact: odoo-manager-windows-x64
            bundles: nsis

    steps:
      - uses: actions/checkout@v5

      - name: Install Linux desktop dependencies
        if: runner.os == 'Linux'
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          set -euxo pipefail

          retry() {
            for attempt in 1 2 3; do
              "$@" && return 0
              if [ "$attempt" -lt 3 ]; then
                sleep $((attempt * 10))
              fi
            done
            return 1
          }

          retry sudo apt-get update

          FUSE_PACKAGE=libfuse2
          if ! apt-cache show "$FUSE_PACKAGE" >/dev/null 2>&1; then
            FUSE_PACKAGE=libfuse2t64
          fi

          retry sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            "$FUSE_PACKAGE"

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: odoo-manager-next/package-lock.json

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: odoo-manager-next/src-tauri -> target

      - name: Install frontend dependencies
        working-directory: odoo-manager-next
        run: npm ci

      - name: Install sidecar builder
        run: python -m pip install pyinstaller

      - name: Run backend tests
        run: python -m unittest discover -s tests -v

      - name: Build native sidecar and Tauri installer
        env:
          CI: "true"
        run: python scripts/build_desktop.py --bundles ${{ matrix.bundles }}

      - name: Upload installers
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact }}
          path: odoo-manager-next/src-tauri/target/release/bundle/**
          if-no-files-found: error
