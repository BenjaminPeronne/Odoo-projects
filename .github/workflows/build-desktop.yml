name: Build desktop applications

on:
  workflow_dispatch:
  push:
    tags:
      - "app-v*"

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.artifact }}
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            artifact: odoo-manager-macos
            bundles: app,dmg
          - platform: ubuntu-22.04
            artifact: odoo-manager-linux-x64
            bundles: deb,appimage
          - platform: windows-latest
            artifact: odoo-manager-windows-x64
            bundles: nsis

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux desktop dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libfuse2

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: odoo-manager-next/package-lock.json

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: odoo-manager-next/src-tauri -> target

      - name: Install frontend dependencies
        working-directory: odoo-manager-next
        run: npm ci

      - name: Install sidecar builder
        run: python -m pip install pyinstaller

      - name: Run backend tests
        run: python -m unittest discover -s tests -v

      - name: Build native sidecar and Tauri installer
        env:
          CI: "true"
        run: python scripts/build_desktop.py --bundles ${{ matrix.bundles }}

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: odoo-manager-next/src-tauri/target/release/bundle/**
          if-no-files-found: error
